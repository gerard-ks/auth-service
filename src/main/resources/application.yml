spring:

  application:
    name: auth-service

  main:
    banner-mode: console

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/authdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: AuthDB-HikariCP
      maximum-pool-size: 10
      minimum-idle: 10
      connection-timeout: 20000
      max-lifetime: 1200000
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    validate-on-migrate: true
    baseline-on-migrate: true
    locations: classpath:db/migration


  data:
    redis:
      repositories:
        enabled: false
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 1000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
        shutdown-timeout: 200ms


  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}
            required: ${MAIL_SMTP_STARTTLS_REQUIRED:false}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000


  cache:
    type: caffeine


  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: true

server:
  port: 8080
  shutdown: graceful
  compression:
    enabled: true
    min-response-size: 1024
    mime-types:
      - application/json
      - application/xml
      - text/html
      - text/plain

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics,prometheus}
      base-path: /actuator
  endpoint:
    health:
      show-details: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:when_authorized}


springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: alpha
  paths-to-match: /api/**


logging:
  level:
    root: INFO
    dev.ks.authlayerarchitecture: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
    org.flywaydb: WARN
    io.github.resilience4j: INFO
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(%5level) %clr(---){faint} %clr([%X{correlationId:-no-correlation}]){magenta} %clr([%X{httpMethod:-no-method} %X{httpUri:-no-uri}]){cyan} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:%wEx}"


auth-service:

  jwt:
    secret-key: ${JWT_SECRET_KEY}
    issuer: ${JWT_ISSUER:auth-service}
    ttl-minutes: ${JWT_TTL_MINUTES:15}

  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
    allowed-methods: ${APP_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
    allowed-headers: ${APP_CORS_ALLOWED_HEADERS:*}
    exposed-headers: ${APP_CORS_EXPOSED_HEADERS:X-Token-Strategy}
    allow-credentials: ${APP_CORS_ALLOW_CREDENTIALS:true}
    max-age: ${APP_CORS_MAX_AGE:3600}

  base-url: ${APP_BASE_URL:http://localhost:8080}

  verification:
    enabled: ${APP_VERIFICATION_ENABLED:true}
    ttl-minutes: ${APP_VERIFICATION_TTL_MINUTES:15}
    resend-delay-minutes: ${APP_VERIFICATION_RESEND_DELAY_MINUTES:2}

  brute-force:
    max-attempts: ${APP_BRUTE_FORCE_MAX_ATTEMPTS:5}
    block-minutes: ${APP_BRUTE_FORCE_BLOCK_MINUTES:15}

  otp:
    max-attempts: ${APP_OTP_MAX_ATTEMPTS:5}
    block-minutes: ${APP_OTP_BLOCK_MINUTES:15}

  refresh-token:
    ttl-days: ${APP_REFRESH_TOKEN_TTL_DAYS:7}

  email-queue:
    max-attempts: ${APP_EMAIL_QUEUE_MAX_ATTEMPTS:3}
    backoff-delay-ms: ${APP_EMAIL_QUEUE_BACKOFF_DELAY_MS:2000}
    job-deadline-ms: ${APP_EMAIL_QUEUE_JOB_DEADLINE_MS:10000}
    queue-name: email-notifications

  initial-admin:
    email: ${APP_INITIAL_ADMIN_EMAIL}
    password: ${APP_INITIAL_ADMIN_PASSWORD}
    first-name: ${APP_INITIAL_ADMIN_FIRSTNAME}
    last-name: ${APP_INITIAL_ADMIN_LASTNAME}