<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Your account has been disabled</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header { text-align: center; margin-bottom: 32px; }
        .header h1 { color: #1a1a2e; font-size: 24px; margin: 0; }
        .warning-box {
            background-color: #fef2f2;
            border: 2px solid #ef4444;
            border-radius: 8px;
            text-align: center;
            padding: 20px;
            margin: 24px 0;
        }
        .warning-icon { font-size: 48px; margin-bottom: 8px; }
        .btn {
            display: inline-block;
            background-color: #4f46e5;
            color: #ffffff !important;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            margin: 24px 0;
        }
        .divider { border: none; border-top: 1px solid #e5e7eb; margin: 24px 0; }
        .footer { text-align: center; color: #6b7280; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1 th:text="${appName}">Auth Service</h1>
    </div>

    <p>Hello,</p>
    <p>
        Your account has been disabled by an administrator.
        You will no longer be able to log in.
    </p>

    <div class="warning-box">
        <div class="warning-icon">⚠️</div>
        <p style="margin: 0; font-weight: bold; color: #dc2626;">
            Account disabled
        </p>
    </div>

    <p>
        If you believe this is an error or would like more information,
        please contact our support team.
    </p>

    <div style="text-align: center;">
        <a th:href="${supportUrl}" class="btn">
            Contact support
        </a>
    </div>

    <hr class="divider"/>

    <div class="footer">
        <p>
            &copy; <span th:text="${appName}">Auth Service</span> —
            <a th:href="${appUrl}" style="color: #4f46e5;">
                Visit our website
            </a>
        </p>
    </div>

</div>
</body>
</html>
