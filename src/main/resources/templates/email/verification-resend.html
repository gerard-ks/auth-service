<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Verify your email address (resend)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header { text-align: center; margin-bottom: 32px; }
        .header h1 { color: #1a1a2e; font-size: 24px; margin: 0; }
        .btn {
            display: inline-block;
            background-color: #4f46e5;
            color: #ffffff !important;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            margin: 24px 0;
        }
        .otp-box {
            background-color: #f0f0ff;
            border: 2px dashed #4f46e5;
            border-radius: 8px;
            text-align: center;
            padding: 20px;
            margin: 24px 0;
        }
        .otp-code {
            font-size: 36px;
            font-weight: bold;
            color: #1a1a2e;
            letter-spacing: 8px;
        }
        .divider { border: none; border-top: 1px solid #e5e7eb; margin: 24px 0; }
        .footer { text-align: center; color: #6b7280; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1 th:text="${appName}">Auth Service</h1>
    </div>

    <p>Hello,</p>
    <p>
        You requested a new verification email.
        Please verify your email address using the link or code below.
    </p>

    <div style="text-align: center;">
        <a th:href="${linkUrl}" class="btn">
            Verify my email address
        </a>
    </div>

    <hr class="divider"/>

    <p style="text-align: center; color: #6b7280;">
        Or use this verification code :
    </p>
    <div class="otp-box">
        <div class="otp-code" th:text="${otpCode}">123456</div>
    </div>

    <p style="text-align: center; color: #6b7280; font-size: 13px;">
        This link and code expire in
        <strong th:text="${ttlMinutes}">15</strong> minutes.
    </p>

    <hr class="divider"/>

    <div class="footer">
        <p>
            &copy; <span th:text="${appName}">Auth Service</span> —
            <a th:href="${appUrl}" style="color: #4f46e5;">
                Visit our website
            </a>
        </p>
    </div>

</div>
</body>
</html>
