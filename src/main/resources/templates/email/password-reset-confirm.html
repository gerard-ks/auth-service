<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Your password has been reset</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header { text-align: center; margin-bottom: 32px; }
        .header h1 { color: #1a1a2e; font-size: 24px; margin: 0; }
        .success-box {
            background-color: #f0fdf4;
            border: 2px solid #22c55e;
            border-radius: 8px;
            text-align: center;
            padding: 20px;
            margin: 24px 0;
        }
        .success-icon {
            font-size: 48px;
            margin-bottom: 8px;
        }
        .divider { border: none; border-top: 1px solid #e5e7eb; margin: 24px 0; }
        .footer { text-align: center; color: #6b7280; font-size: 12px; }
        .warning { color: #ef4444; font-size: 13px; text-align: center; }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1 th:text="${appName}">Auth Service</h1>
    </div>

    <p>Hello,</p>
    <p>
        Your password has been successfully reset.
    </p>

    <div class="success-box">
        <div class="success-icon">✅</div>
        <p style="margin: 0; font-weight: bold; color: #15803d;">
            Password reset successful
        </p>
        <p style="margin: 8px 0 0 0; color: #6b7280; font-size: 13px;">
            On : <span th:text="${datetime}">2024-01-15T10:00:00Z</span>
        </p>
    </div>

    <hr class="divider"/>

    <p class="warning">
        If you did not perform this action,
        please contact our support immediately.
    </p>

    <div class="footer">
        <p>
            &copy; <span th:text="${appName}">Auth Service</span> —
            <a th:href="${appUrl}" style="color: #4f46e5;">
                Visit our website
            </a>
        </p>
    </div>

</div>
</body>
</html>
