<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Reset your password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header { text-align: center; margin-bottom: 32px; }
        .header h1 { color: #1a1a2e; font-size: 24px; margin: 0; }
        .btn {
            display: inline-block;
            background-color: #ef4444;
            color: #ffffff !important;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            margin: 24px 0;
        }
        .divider { border: none; border-top: 1px solid #e5e7eb; margin: 24px 0; }
        .footer { text-align: center; color: #6b7280; font-size: 12px; }
        .warning { color: #ef4444; font-size: 13px; text-align: center; }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1 th:text="${appName}">Auth Service</h1>
    </div>

    <p>Hello,</p>
    <p>
        We received a request to reset your password.
        Click the button below to proceed.
    </p>

    <div style="text-align: center;">
        <a th:href="${resetUrl}" class="btn">
            Reset my password
        </a>
    </div>

    <p style="text-align: center; color: #6b7280; font-size: 13px;">
        This link expires in
        <strong th:text="${ttlMinutes}">15</strong> minutes.
    </p>

    <hr class="divider"/>

    <p class="warning">
        If you did not request a password reset,
        please ignore this email. Your account is safe.
    </p>

    <div class="footer">
        <p>
            &copy; <span th:text="${appName}">Auth Service</span> —
            <a th:href="${appUrl}" style="color: #4f46e5;">
                Visit our website
            </a>
        </p>
    </div>

</div>
</body>
</html>
